<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICU脓毒症科研患者浏览中台 | Patient Browser</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        /* 极简扁平化设计系统 */
        :root {
            --primary-blue: #E3F2FD;
            --primary-blue-dark: #1976D2;
            --secondary-green: #E8F5E9;
            --secondary-green-dark: #388E3C;
            --warning-red: #FFEBEE;
            --warning-red-dark: #D32F2F;
            --warning-yellow: #FFF8E1;
            --warning-yellow-dark: #FBC02D;
            --neutral-gray: #F5F5F5;
            --text-primary: #212121;
            --text-secondary: #757575;
            --border-light: #E0E0E0;
        }
        
        * {
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #FAFAFA;
            color: var(--text-primary);
            margin: 0;
            padding: 0;
        }
        
        /* 扁平化卡片 */
        .card-flat {
            background: #FFFFFF;
            border: 1px solid var(--border-light);
            border-radius: 4px;
        }
        
        /* AI助手按钮样式 */
        .ai-explain-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 16px;
            height: 16px;
            margin-left: 4px;
            font-size: 10px;
            background: linear-gradient(135deg, #3B82F6, #8B5CF6);
            color: white;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            opacity: 0.7;
            transition: all 0.2s;
            vertical-align: middle;
        }
        
        .ai-explain-btn:hover {
            opacity: 1;
            transform: scale(1.1);
        }
        
        .ai-explain-inline {
            display: inline-flex;
            align-items: center;
            padding: 2px 6px;
            margin-left: 6px;
            font-size: 11px;
            background: #EEF2FF;
            color: #4F46E5;
            border-radius: 10px;
            cursor: pointer;
            border: 1px solid #C7D2FE;
            transition: all 0.2s;
        }
        
        .ai-explain-inline:hover {
            background: #4F46E5;
            color: white;
        }
        
        .card-flat:hover {
            background: #FAFAFA;
        }
        
        /* 扁平化按钮 */
        .btn-flat {
            border: 1px solid var(--border-light);
            background: #FFFFFF;
            border-radius: 4px;
            cursor: pointer;
            transition: none;
        }
        
        .btn-flat:hover {
            background: var(--neutral-gray);
        }
        
        .btn-flat.active {
            background: var(--primary-blue);
            border-color: var(--primary-blue-dark);
            color: var(--primary-blue-dark);
        }
        
        /* 扁平化输入框 */
        .input-flat {
            border: 1px solid var(--border-light);
            border-radius: 4px;
            background: #FFFFFF;
        }
        
        .input-flat:focus {
            outline: none;
            border-color: var(--primary-blue-dark);
        }
        
        /* 左侧导航 */
        .nav-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            margin: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            color: var(--text-secondary);
        }
        
        .nav-item:hover {
            background: var(--neutral-gray);
        }
        
        .nav-item.active {
            background: var(--primary-blue);
            color: var(--primary-blue-dark);
        }
        
        /* 患者列表卡片 */
        .patient-card {
            display: grid;
            grid-template-columns: 120px 120px 140px 80px 160px 100px;
            gap: 16px;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-light);
            cursor: pointer;
        }
        
        .patient-card:hover {
            background: #FAFAFA;
        }
        
        .patient-card:last-child {
            border-bottom: none;
        }
        
        /* 详情板块 */
        .section-flat {
            background: #FFFFFF;
            border: 1px solid var(--border-light);
            border-radius: 4px;
            margin-bottom: 16px;
        }
        
        .section-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-light);
            background: var(--neutral-gray);
            font-weight: 500;
        }
        
        .section-body {
            padding: 16px;
        }
        
        /* 风险等级标签 */
        .risk-badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
        }
        
        .risk-high {
            background: var(--warning-red);
            color: var(--warning-red-dark);
        }
        
        .risk-medium {
            background: var(--warning-yellow);
            color: var(--warning-yellow-dark);
        }
        
        .risk-low {
            background: var(--secondary-green);
            color: var(--secondary-green-dark);
        }
        
        /* 表型标签 */
        .phenotype-badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
        }
        
        .ph-0 { background: #E3F2FD; color: #1976D2; }
        .ph-1 { background: #FFF8E1; color: #FBC02D; }
        .ph-2 { background: #FFEBEE; color: #D32F2F; }
        .ph-3 { background: #F3E5F5; color: #7B1FA2; }
        
        /* 分页 */
        .pagination-btn {
            padding: 8px 16px;
            border: 1px solid var(--border-light);
            background: #FFFFFF;
            cursor: pointer;
        }
        
        .pagination-btn:hover {
            background: var(--neutral-gray);
        }
        
        .pagination-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* 隐藏滚动条但保持功能 */
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body class="h-screen flex overflow-hidden">
    
    <!-- 左侧导航栏 -->
    <aside class="w-56 bg-white border-r border-gray-200 flex flex-col">
        <!-- Logo -->
        <div class="p-4 border-b border-gray-200">
            <div class="flex items-center space-x-2">
                <span class="text-2xl">🏥</span>
                <div>
                    <div class="font-semibold text-sm">ICU Patient Browser</div>
                    <div class="text-xs text-gray-500">脓毒症科研中台</div>
                </div>
            </div>
        </div>
        
        <!-- 导航菜单 -->
        <nav class="flex-1 py-4">
            <div class="nav-item active" onclick="switchView('patients')" id="nav-patients">
                <span class="text-xl mr-3">🏥</span>
                <span>患者总览浏览</span>
            </div>
            <div class="nav-item" onclick="switchView('dashboard')" id="nav-dashboard">
                <span class="text-xl mr-3">📊</span>
                <span>科研数据看板</span>
            </div>
            <div class="nav-item" onclick="switchView('research')" id="nav-research">
                <span class="text-xl mr-3">🏆</span>
                <span>科研成果展示</span>
                <span class="ml-auto text-xs bg-purple-100 text-purple-700 px-1.5 py-0.5 rounded">NEW</span>
            </div>
            <div class="nav-item" onclick="switchView('ai')" id="nav-ai">
                <span class="text-xl mr-3">🤖</span>
                <span>AI智能分析</span>
            </div>
            <div class="nav-item" onclick="switchView('settings')" id="nav-settings">
                <span class="text-xl mr-3">⚙️</span>
                <span>系统配置管理</span>
            </div>
        </nav>
        
        <!-- 底部信息 -->
        <div class="p-4 border-t border-gray-200 text-xs text-gray-500">
            <div>PhysioNet 2012 Dataset</div>
            <div class="mt-1">11,986 Patients</div>
        </div>
    </aside>
    
    <!-- 主内容区 -->
    <main class="flex-1 flex flex-col bg-gray-50">
        
        <!-- 顶部筛选栏 -->
        <header class="bg-white border-b border-gray-200 px-6 py-3">
            <div class="flex items-center space-x-6">
                <!-- 时间筛选 -->
                <div class="flex items-center space-x-2">
                    <span class="text-sm text-gray-600">📅 入院时间:</span>
                    <select id="filter-time" class="input-flat px-3 py-1.5 text-sm" onchange="applyFilters()">
                        <option value="all">全部时间</option>
                        <option value="24h">近24小时</option>
                        <option value="7d">近7天</option>
                        <option value="30d">近30天</option>
                    </select>
                </div>
                
                <!-- ICU病区筛选 -->
                <div class="flex items-center space-x-2">
                    <span class="text-sm text-gray-600">🏥 ICU病区:</span>
                    <select id="filter-icu" class="input-flat px-3 py-1.5 text-sm" onchange="applyFilters()">
                        <option value="all">全部病区</option>
                        <option value="cardiac">心内ICU</option>
                        <option value="surgical">外科ICU</option>
                        <option value="medical">内科ICU</option>
                        <option value="other">综合ICU</option>
                    </select>
                </div>
                
                <!-- 表型筛选 -->
                <div class="flex items-center space-x-2">
                    <span class="text-sm text-gray-600">🧬 时序表型:</span>
                    <select id="filter-phenotype" class="input-flat px-3 py-1.5 text-sm" onchange="applyFilters()">
                        <option value="-1">全部表型</option>
                        <option value="0">P0 低危型</option>
                        <option value="1">P1 中高危型</option>
                        <option value="2">P2 高危型</option>
                        <option value="3">P3 低中危型</option>
                    </select>
                </div>
                
                <!-- AI风险筛选 -->
                <div class="flex items-center space-x-2">
                    <span class="text-sm text-gray-600">🤖 AI风险:</span>
                    <select id="filter-risk" class="input-flat px-3 py-1.5 text-sm" onchange="applyFilters()">
                        <option value="all">全部风险</option>
                        <option value="🔴">🔴 高风险</option>
                        <option value="🟡">🟡 中风险</option>
                        <option value="🟢">🟢 低风险</option>
                    </select>
                </div>
            </div>
        </header>
        
        <!-- 内容容器 -->
        <div id="content-area" class="flex-1 overflow-auto p-6">
            <!-- 动态加载内容 -->
        </div>
        
    </main>
    
    <script>
        // 全局状态
        let currentView = 'patients';
        let currentPage = 1;
        let currentPatientId = null;
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            switchView('patients');
        });
        
        // 切换视图
        function switchView(view) {
            currentView = view;
            
            // 更新导航状态
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`nav-${view}`).classList.add('active');
            
            // 加载对应视图
            const contentArea = document.getElementById('content-area');
            
            switch(view) {
                case 'patients':
                    loadPatientListView();
                    break;
                case 'dashboard':
                    loadDashboardView();
                    break;
                case 'ai':
                    loadAIView();
                    break;
                case 'research':
                    loadResearchDashboardView();
                    break;
                case 'settings':
                    loadSettingsView();
                    break;
            }
        }
        
        // ========== 视图A: 患者总览列表 ==========
        async function loadPatientListView() {
            const contentArea = document.getElementById('content-area');
            contentArea.innerHTML = `
                <div class="card-flat mb-4">
                    <div class="px-6 py-3 border-b border-gray-200 flex items-center justify-between">
                        <div class="flex items-center space-x-2">
                            <span class="text-lg">📑</span>
                            <span class="font-medium">患者总览列表</span>
                            <span class="text-sm text-gray-500" id="patient-count"></span>
                        </div>
                        <div class="flex items-center space-x-2">
                            <button onclick="refreshPatientList()" class="btn-flat px-4 py-1.5 text-sm">
                                🔄 刷新
                            </button>
                        </div>
                    </div>
                    
                    <!-- 列表表头 -->
                    <div class="grid grid-cols-[120px_120px_140px_80px_160px_100px] gap-4 px-6 py-2 bg-gray-50 text-sm text-gray-600 border-b border-gray-200">
                        <div>🆔 脱敏ID</div>
                        <div>📅 入院时间</div>
                        <div>🏥 ICU病区</div>
                        <div>风险等级</div>
                        <div>❤️ 核心体征</div>
                        <div>🤖 预测时间</div>
                    </div>
                    
                    <!-- 患者列表 -->
                    <div id="patient-list"></div>
                    
                    <!-- 分页 -->
                    <div class="px-6 py-3 border-t border-gray-200 flex items-center justify-between">
                        <span class="text-sm text-gray-500" id="pagination-info"></span>
                        <div class="flex items-center space-x-2">
                            <button onclick="changePage(-1)" class="pagination-btn text-sm" id="btn-prev">上一页</button>
                            <span class="text-sm" id="page-number">第 1 页</span>
                            <button onclick="changePage(1)" class="pagination-btn text-sm" id="btn-next">下一页</button>
                        </div>
                    </div>
                </div>
            `;
            
            await fetchPatientList();
        }
        
        async function fetchPatientList() {
            const icuType = document.getElementById('filter-icu').value;
            const riskLevel = document.getElementById('filter-risk').value;
            const phenotype = document.getElementById('filter-phenotype').value;
            
            try {
                const params = new URLSearchParams({
                    page: currentPage,
                    per_page: 20,
                    icu_type: icuType,
                    risk_level: riskLevel,
                    phenotype: phenotype
                });
                
                const response = await fetch(`/api/patients?${params}`);
                const data = await response.json();
                
                renderPatientList(data);
            } catch (error) {
                console.error('Error fetching patients:', error);
                document.getElementById('patient-list').innerHTML = `
                    <div class="p-8 text-center text-gray-500">加载失败，请重试</div>
                `;
            }
        }
        
        function renderPatientList(data) {
            const listContainer = document.getElementById('patient-list');
            const { patients, total, page, per_page } = data;
            
            if (patients.length === 0) {
                listContainer.innerHTML = `
                    <div class="p-8 text-center text-gray-500">暂无数据</div>
                `;
                return;
            }
            
            // 渲染患者卡片
            listContainer.innerHTML = patients.map(p => `
                <div class="patient-card" onclick="openPatientDetail('${p.masked_id}')">
                    <div class="font-mono text-sm font-medium">${p.masked_id}</div>
                    <div class="text-sm">${p.admission_time}</div>
                    <div class="text-sm">${p.icu_ward}</div>
                    <div class="risk-badge ${getRiskClass(p.risk_level)}">${p.risk_level}</div>
                    <div class="text-sm font-mono">${p.vitals_summary}</div>
                    <div class="text-xs text-gray-500">${p.last_prediction}</div>
                </div>
            `).join('');
            
            // 更新统计
            document.getElementById('patient-count').textContent = `(${total.toLocaleString()}人)`;
            document.getElementById('pagination-info').textContent = `显示 ${(page-1)*per_page + 1}-${Math.min(page*per_page, total)} / ${total} 条`;
            document.getElementById('page-number').textContent = `第 ${page} 页`;
            
            // 更新分页按钮
            document.getElementById('btn-prev').disabled = page <= 1;
            document.getElementById('btn-next').disabled = page * per_page >= total;
        }
        
        function getRiskClass(risk) {
            if (risk === '🔴') return 'risk-high';
            if (risk === '🟡') return 'risk-medium';
            return 'risk-low';
        }
        
        function changePage(delta) {
            currentPage += delta;
            if (currentPage < 1) currentPage = 1;
            fetchPatientList();
        }
        
        function refreshPatientList() {
            currentPage = 1;
            fetchPatientList();
        }
        
        function applyFilters() {
            currentPage = 1;
            fetchPatientList();
        }
        
        // ========== 视图B: 单患者详情 ==========
        async function openPatientDetail(maskedId) {
            currentPatientId = maskedId;
            
            const contentArea = document.getElementById('content-area');
            contentArea.innerHTML = `
                <div class="mb-4 flex items-center space-x-2">
                    <button onclick="switchView('patients')" class="btn-flat px-3 py-1.5 text-sm">
                        ← 返回列表
                    </button>
                    <span class="text-gray-400">|</span>
                    <span class="text-lg">📊</span>
                    <span class="font-medium">患者深度详情</span>
                    <span class="font-mono text-blue-600">${maskedId}</span>
                </div>
                
                <div id="patient-detail-content">
                    <div class="text-center py-12 text-gray-500">加载中...</div>
                </div>
            `;
            
            try {
                const response = await fetch(`/api/patients/${maskedId}`);
                const data = await response.json();
                renderPatientDetail(data);
            } catch (error) {
                console.error('Error fetching patient detail:', error);
                document.getElementById('patient-detail-content').innerHTML = `
                    <div class="text-center py-12 text-red-500">加载失败</div>
                `;
            }
        }
        
        function renderPatientDetail(data) {
            const { basic_info, vitals_series, ai_analysis, clinical_records, phenotype_trajectory } = data;
            
            document.getElementById('patient-detail-content').innerHTML = `
                <!-- 1. 基础脱敏信息 -->
                <div class="section-flat">
                    <div class="section-header">
                        <span class="text-lg mr-2">🧾</span>基础脱敏信息
                    </div>
                    <div class="section-body">
                        <div class="grid grid-cols-4 gap-6">
                            <div>
                                <div class="text-xs text-gray-500 mb-1">🆔 脱敏ID</div>
                                <div class="font-mono font-medium">${basic_info.masked_id}</div>
                            </div>
                            <div>
                                <div class="text-xs text-gray-500 mb-1">👤 年龄/性别</div>
                                <div>${basic_info.age}岁 / ${basic_info.sex}</div>
                            </div>
                            <div>
                                <div class="text-xs text-gray-500 mb-1">🏥 ICU病区</div>
                                <div>${basic_info.icu_ward}</div>
                            </div>
                            <div>
                                <div class="text-xs text-gray-500 mb-1">⏱️ ICU停留</div>
                                <div>${basic_info.los_hours}小时</div>
                            </div>
                            <div>
                                <div class="text-xs text-gray-500 mb-1">📅 入院时间</div>
                                <div>${basic_info.admission_time}</div>
                            </div>
                            <div>
                                <div class="text-xs text-gray-500 mb-1">📊 数据来源</div>
                                <div>${basic_info.data_source}</div>
                            </div>
                            <div>
                                <div class="text-xs text-gray-500 mb-1">🏢 医疗中心</div>
                                <div>${basic_info.center}</div>
                            </div>
                            <div>
                                <div class="text-xs text-gray-500 mb-1">⚠️ 预后</div>
                                <div class="${basic_info.mortality_flag ? 'text-red-600 font-medium' : 'text-green-600'}">
                                    ${basic_info.mortality_flag ? '院内死亡' : '存活出院'}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 2. 时序生命体征 -->
                <div class="section-flat">
                    <div class="section-header">
                        <span class="text-lg mr-2">📈</span>时序生命体征曲线
                    </div>
                    <div class="section-body">
                        <div class="grid grid-cols-2 gap-4 mb-4">
                            <div class="p-3 bg-blue-50 rounded">
                                <div class="flex items-center space-x-2 mb-2">
                                    <span>❤️</span>
                                    <span class="text-sm font-medium">心率趋势</span>
                                </div>
                                <canvas id="chart-hr" height="120"></canvas>
                            </div>
                            <div class="p-3 bg-green-50 rounded">
                                <div class="flex items-center space-x-2 mb-2">
                                    <span>💓</span>
                                    <span class="text-sm font-medium">血压趋势</span>
                                </div>
                                <canvas id="chart-bp" height="120"></canvas>
                            </div>
                            <div class="p-3 bg-purple-50 rounded">
                                <div class="flex items-center space-x-2 mb-2">
                                    <span>🫀</span>
                                    <span class="text-sm font-medium">平均动脉压</span>
                                </div>
                                <canvas id="chart-map" height="120"></canvas>
                            </div>
                            <div class="p-3 bg-orange-50 rounded">
                                <div class="flex items-center space-x-2 mb-2">
                                    <span>🌡️</span>
                                    <span class="text-sm font-medium">体温趋势</span>
                                </div>
                                <canvas id="chart-temp" height="120"></canvas>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 3. AI预测分析 -->
                <div class="section-flat">
                    <div class="section-header">
                        <span class="text-lg mr-2">🤖</span>AI脓毒症预测分析
                    </div>
                    <div class="section-body">
                        <div class="grid grid-cols-3 gap-6">
                            <div class="col-span-2">
                                <div class="flex items-center space-x-2 mb-3">
                                    <span>🔺🔻</span>
                                    <span class="text-sm font-medium">风险趋势</span>
                                </div>
                                <canvas id="chart-risk" height="150"></canvas>
                            </div>
                            <div>
                                <div class="flex items-center space-x-2 mb-3">
                                    <span>⚠️</span>
                                    <span class="text-sm font-medium">预警信息</span>
                                </div>
                                <div class="space-y-2">
                                    ${ai_analysis.warnings.map(w => `
                                        <div class="p-2 bg-red-50 border-l-4 border-red-400 text-sm">
                                            ${w}
                                        </div>
                                    `).join('')}
                                </div>
                                <div class="mt-4 p-3 bg-gray-50 rounded text-sm">
                                    <div class="flex justify-between mb-1">
                                        <span>模型置信度</span>
                                        <span class="font-medium">${(ai_analysis.model_confidence * 100).toFixed(0)}%</span>
                                    </div>

                { label: 'ICU时长', value: data.complete_los, total: data.total_records },

        async function fetchResearchDashboardData() {
            try {
                const [overviewRes, performanceRes] = await Promise.all([
                    fetch('/api/research/models/overview'),
                    fetch('/api/research/models/performance')
                ]);
                
                const overview = await overviewRes.json();
                const performance = await performanceRes.json();
                
                renderResearchDashboard(overview, performance);
            } catch (error) {
                console.error('Error fetching research data:', error);
            }
        }
        
        function renderResearchDashboard(overview, performance) {
            // 更新核心指标
            if (overview.mortality_prediction && overview.mortality_prediction.length > 0) {
                const s15 = overview.mortality_prediction[0];
                document.getElementById('metric-auroc').textContent = s15.performance.test_auroc.toFixed(3);
            }
            
            if (overview.phenotype_clustering) {
                const s1 = overview.phenotype_clustering.find(m => m.model_id.includes('S1_SS_Encoder'));
                if (s1) {
                    document.getElementById('metric-silhouette').textContent = s1.silhouette_score.toFixed(3);
                }
            }
            
            if (overview.multitask_models && overview.multitask_models.length > 0) {
                const mt = overview.multitask_models[0];
                const avgF1 = (mt.performance.immune_f1 + mt.performance.organ_f1 + mt.performance.fluid_f1) / 3;
                document.getElementById('metric-multitask').textContent = avgF1.toFixed(3);
                document.getElementById('metric-params').textContent = (mt.architecture.n_parameters / 1000).toFixed(1) + 'K';
            }
            
            // 渲染优化建议
            if (overview.optimization_suggestions) {
                renderOptimizationSuggestions(overview.optimization_suggestions);
            }
            
            // 渲染图表
            renderMortalityComparisonChart(performance.mortality_auroc_comparison);
            renderClusteringComparisonChart(performance.silhouette_comparison);
            renderMultitaskRadarChart(overview.multitask_models);
        }
        
        function renderOptimizationSuggestions(suggestions) {
            const container = document.getElementById('optimization-suggestions');
            if (!container || !suggestions) return;
            
            const priorityColors = {
                'high': 'bg-red-50 border-red-200 text-red-800',
                'medium': 'bg-yellow-50 border-yellow-200 text-yellow-800',
                'low': 'bg-blue-50 border-blue-200 text-blue-800',
                'info': 'bg-green-50 border-green-200 text-green-800'
            };
            
            container.innerHTML = suggestions.map(s => `
                <div class="p-3 rounded border ${priorityColors[s.priority] || 'bg-gray-50 border-gray-200'}">
                    <div class="flex items-start justify-between">
                        <div>
                            <div class="font-medium">${s.category}</div>
                            ${s.issue ? `<div class="text-sm opacity-80 mt-1">问题: ${s.issue}</div>` : ''}
                            <div class="text-sm mt-1">💡 ${s.suggestion}</div>
                        </div>
                        <span class="text-xs px-2 py-1 rounded bg-white bg-opacity-50">${s.impact} impact</span>
                    </div>
                </div>
            `).join('');
        }
        
        function renderMortalityComparisonChart(data) {
            if (!data || data.length === 0) return;
            const ctx = document.getElementById('chart-mortality-compare');
            if (!ctx) return;
            
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: data.map(d => d.model.replace(' + Logistic Regression', '').replace(' Student Transformer', '')),
                    datasets: [
                        { label: 'Train AUROC', data: data.map(d => d.train), backgroundColor: '#42A5F5', borderRadius: 4 },
                        { label: 'Val AUROC', data: data.map(d => d.val), backgroundColor: '#66BB6A', borderRadius: 4 },
                        { label: 'Test AUROC', data: data.map(d => d.test), backgroundColor: '#FFA726', borderRadius: 4 }
                    ]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { position: 'bottom' } },
                    scales: { y: { beginAtZero: false, min: 0.7, max: 0.9 } }
                }
            });
        }
        
        function renderClusteringComparisonChart(data) {
            if (!data || data.length === 0) return;
            const ctx = document.getElementById('chart-clustering-compare');
            if (!ctx) return;
            
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: data.map(d => d.model.replace(' (K=4)', '')),
                    datasets: [{
                        label: 'Silhouette Score',
                        data: data.map(d => d.silhouette),
                        backgroundColor: data.map(d => d.is_baseline ? '#9E9E9E' : '#42A5F5'),
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true, max: 0.25 } }
                }
            });
        }
        
        function renderMultitaskRadarChart(models) {
            if (!models || models.length === 0) return;
            const ctx = document.getElementById('chart-multitask-radar');
            if (!ctx) return;
            
            const mt = models[0];
            new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['死亡率\n(AUROC)', '免疫状态\n(F1)', '器官功能\n(F1)', '液体平衡\n(F1)'],
                    datasets: [{
                        label: 'S6 Multitask',
                        data: [
                            mt.performance.mortality_auroc,
                            mt.performance.immune_f1,
                            mt.performance.organ_f1,
                            mt.performance.fluid_f1
                        ],
                        backgroundColor: 'rgba(66, 165, 245, 0.2)',
                        borderColor: '#42A5F5',
                        borderWidth: 2

                options: {
                    responsive: true,
                    scales: {
                        r: {
                            beginAtZero: true,
                            max: 1.0,
                            ticks: { stepSize: 0.2 }
                        }
                    }
                }
            });
        }

        function addAIExplainButton(element, term, context = '') {

            if (element.querySelector('.ai-explain-btn')) return;
            
            const btn = document.createElement('button');
            btn.className = 'ai-explain-btn inline-flex items-center justify-center w-4 h-4 ml-1 text-xs bg-blue-100 text-blue-600 rounded-full hover:bg-blue-200 transition-colors';

                explainMedicalTerm(term, context);

        // 解释医学术语
        async function explainMedicalTerm(term, context = '') {
            // 显示AI助手面板
            const panel = document.getElementById('ai-assistant-panel');
            if (panel) panel.classList.remove('hidden');
            
            // 添加用户问题到历史
            addMessageToChat('user', `请解释：${term}${context ? ' (' + context + ')' : ''}`);
            
            // 显示加载中
            const loadingId = 'loading-' + Date.now();
            addMessageToChat('assistant', '<span class="animate-pulse">🤔 正在思考...</span>', loadingId, true);
            
            try {
                const response = await fetch('/api/ai/explain', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        term: term,
                        context: context,
                        patient_context: aiAssistantContext.currentPatient
                    })
                });
                
                const result = await response.json();
                
                // 移除加载消息
                const loadingMsg = document.getElementById(loadingId);
                if (loadingMsg) loadingMsg.remove();
                
                // 添加AI回复
                addMessageToChat('assistant', result.explanation || '抱歉，暂时无法解释该术语。');
                
            } catch (error) {
                const loadingMsg = document.getElementById(loadingId);
                if (loadingMsg) loadingMsg.remove();
                addMessageToChat('assistant', '抱歉，解释服务暂时不可用。');
            }
        }
        
        // 快捷提问
        function askAIQuick(question) {
            const input = document.getElementById('ai-chat-input');
            if (input) {
                input.value = question;
                sendAIQuestion();
            }
        }
        
        // 发送问题
        async function sendAIQuestion() {
            const input = document.getElementById('ai-chat-input');
            const question = input?.value?.trim();
            if (!question) return;
            
            input.value = '';
            addMessageToChat('user', question);
            
            const loadingId = 'loading-' + Date.now();
            addMessageToChat('assistant', '<span class="animate-pulse">🤔 思考中...</span>', loadingId, true);
            
            try {
                const response = await fetch('/api/ai/assistant-chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        question: question,
                        context: aiAssistantContext
                    })
                });
                
                const result = await response.json();
                
                const loadingMsg = document.getElementById(loadingId);
                if (loadingMsg) loadingMsg.remove();
                
                addMessageToChat('assistant', result.answer || '抱歉，我无法回答这个问题。');
                
            } catch (error) {
                const loadingMsg = document.getElementById(loadingId);
                if (loadingMsg) loadingMsg.remove();
                addMessageToChat('assistant', '抱歉，服务暂时不可用。请稍后重试。');
            }
        }
        
        // 添加消息到聊天历史
        function addMessageToChat(role, content, id = null, isHTML = false) {
            const history = document.getElementById('ai-chat-history');
            if (!history) return;
            
            const msgDiv = document.createElement('div');
            if (id) msgDiv.id = id;
            msgDiv.className = 'flex items-start space-x-2' + (role === 'user' ? ' flex-row-reverse space-x-reverse' : '');
            
            const avatar = role === 'user' 
                ? '<div class="w-8 h-8 bg-gray-300 rounded-full flex items-center justify-center text-gray-600 text-sm flex-shrink-0">👤</div>'
                : '<div class="w-8 h-8 bg-gradient-to-br from-blue-500 to-purple-600 rounded-full flex items-center justify-center text-white text-sm flex-shrink-0">🤖</div>';
            
            // AI助手的消息需要保留换行格式
            const bubbleClass = role === 'user' 
                ? 'bg-blue-500 text-white rounded-lg p-2 text-sm max-w-[85%]'
                : 'bg-blue-50 rounded-lg p-2 text-sm text-gray-700 max-w-[85%]';
            
            // 处理内容
            let processedContent = content;
            if (typeof content === 'string' && !isHTML) {
                // 转义HTML特殊字符防止XSS，但保留换行
                processedContent = content
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;');
                // 将换行符转换为<br>标签
                processedContent = processedContent.replace(/\n/g, '<br>');
            }
            
            msgDiv.innerHTML = `
                ${avatar}
                <div class="${bubbleClass}">${processedContent}</div>
            `;
            
            history.appendChild(msgDiv);
            history.scrollTop = history.scrollHeight;
        }

        async function runClinicalPipeline() {
            const btn = document.getElementById('pipeline-btn');
            btn.disabled = true;
            btn.innerHTML = '<span class="animate-spin">⏳</span> 分析中...';
            
            try {
                const patientData = getAIPatientData();
                
                // 并行调用原有Pipeline和S6 API
                const [pipelineRes, s6PredictRes, s6RecommendRes] = await Promise.all([
                    fetch('/api/clinical/pipeline', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(patientData)
                    }),
                    fetch('/api/sepsis-subtypes/predict', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            time_series: prepareS6TimeSeries(patientData),
                            mortality_threshold: 0.4
                        })
                    }),
                    fetch('/api/sepsis-subtypes/recommend', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            time_series: prepareS6TimeSeries(patientData),
                            mortality_threshold: 0.4,
                            probability_threshold: 0.3,
                            top_k: 2
                        })
                    })
                ]);
                
                const pipelineResult = await pipelineRes.json();
                const s6PredictResult = s6PredictRes.ok ? await s6PredictRes.json() : null;
                const s6RecommendResult = s6RecommendRes.ok ? await s6RecommendRes.json() : null;
                
                // 更新原有Pipeline结果
                updateClinicalDashboard(pipelineResult);
                
                // 更新S6结果
                if (s6PredictResult && s6RecommendResult) {
                    updateS6Dashboard(s6PredictResult, s6RecommendResult);
                }
                
            } catch (error) {
                alert('Pipeline运行失败: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '🚀 运行Pipeline';
            }
        }
        
        // 准备S6时间序列数据 (B, T, F) 格式
        function prepareS6TimeSeries(patientData) {
            // S6需要43维特征: 42连续特征 + 1治疗特征
            // 简化处理：使用患者当前数据作为单时间点输入
            const vitals = patientData.vitals || {};
            const labs = patientData.labs || {};
            
            const features = [
                (vitals.heart_rate || 80) / 150.0,  // 归一化
                (vitals.sbp || 120) / 200.0,
                (vitals.dbp || 80) / 120.0,
                (vitals.map || 93) / 120.0,
                (vitals.resp_rate || 18) / 40.0,
                (vitals.spo2 || 97) / 100.0,
                (vitals.temperature || 37) / 42.0,
                (vitals.gcs || 15) / 15.0,
                (labs.creatinine || 1.0) / 5.0,
                (labs.bun || 15) / 50.0,
                (labs.wbc || 10) / 30.0,
                (labs.lactate || 1.5) / 10.0,
                (labs.platelet || 200) / 500.0,
                (labs.bilirubin || 1.0) / 10.0,
                (labs.pao2 || 80) / 100.0,
                (labs.fio2 || 0.21) / 1.0,
                // 填充剩余特征到43维
                ...Array(27).fill(0.0)
            ];
            return [[features]];  // (B=1, T=1, F=43)
        }

        // 渲染概率条 (从数组格式)
        function renderProbabilityBarsFromArray(containerId, probabilities) {
            const container = document.getElementById(containerId);
            if (!container || !probabilities || !Array.isArray(probabilities)) return;
            
            // 找到最大概率
            const maxProb = Math.max(...probabilities.map(p => p.probability || 0));
            
            // 按概率排序并渲染
            container.innerHTML = probabilities
                .slice() // 复制数组
                .sort((a, b) => (b.probability || 0) - (a.probability || 0))
                .map((item) => {
                    const label = item.display_name_zh || item.label || 'Unknown';
                    const prob = item.probability || 0;
                    const percentage = (prob * 100).toFixed(1);
                    const isTop = prob === maxProb;
                    return `
                        <div class="flex items-center text-xs mb-1">
                            <span class="w-28 truncate ${isTop ? 'font-semibold text-gray-800' : 'text-gray-500'}">${label}</span>
                            <div class="flex-1 mx-2 bg-gray-200 rounded-full h-2 overflow-hidden">
                                <div class="${isTop ? 'bg-blue-500' : 'bg-gray-400'} h-full rounded-full" style="width: ${percentage}%"></div>
                            </div>

        function updateClinicalDashboard(result) {
            const stage1 = result.stage1_triage;
            const stage2 = result.stage2_phenotyping;
            const stage3 = result.stage3_treatment;
            
            // Stage 1: 危险评估
            const scores = stage1.scores;
            
            // qSOFA
            document.getElementById('qsofa-score').textContent = scores.qsofa.score + '/3';
            document.getElementById('qsofa-status').textContent = scores.qsofa.interpretation;
            document.getElementById('qsofa-card').className = scores.qsofa.score >= 2 
                ? 'bg-red-50 rounded p-2 text-center border border-red-200' 
                : 'bg-green-50 rounded p-2 text-center border border-green-200';
            document.getElementById('qsofa-score').className = scores.qsofa.score >= 2 
                ? 'text-xl font-bold text-red-600' : 'text-xl font-bold text-green-600';
            
            // SOFA
            document.getElementById('sofa-score').textContent = scores.sofa.total_score;
            document.getElementById('sofa-status').textContent = scores.sofa.interpretation.substring(0, 10);
            document.getElementById('sofa-card').className = scores.sofa.total_score >= 2 
                ? 'bg-red-50 rounded p-2 text-center border border-red-200' 
                : 'bg-green-50 rounded p-2 text-center border border-green-200';
            document.getElementById('sofa-score').className = scores.sofa.total_score >= 2 
                ? 'text-xl font-bold text-red-600' : 'text-xl font-bold text-green-600';
            
            // SOFA组分
            const sofaComps = scores.sofa.components;
            document.getElementById('sofa-components').innerHTML = [
                {k: 'respiratory', n: '呼吸', v: sofaComps.respiratory.score},
                {k: 'coagulation', n: '凝血', v: sofaComps.coagulation.score},
                {k: 'liver', n: '肝脏', v: sofaComps.liver.score},
                {k: 'cardiovascular', n: '心血管', v: sofaComps.cardiovascular.score},
                {k: 'nervous', n: '神经', v: sofaComps.nervous.score},
                {k: 'renal', n: '肾脏', v: sofaComps.renal.score}
            ].map(c => `<div class="${c.v > 0 ? 'bg-red-100 text-red-700' : 'bg-green-50 text-green-600'} rounded p-1 text-center font-medium">${c.n}:${c.v}</div>`).join('');
            
            // SIRS
            document.getElementById('sirs-score').textContent = scores.sirs.score + '/4';
            document.getElementById('sirs-status').textContent = scores.sirs.interpretation.substring(0, 8);
            document.getElementById('sirs-card').className = scores.sirs.sirs_positive 
                ? 'bg-yellow-50 rounded p-2 text-center border border-yellow-200' 
                : 'bg-green-50 rounded p-2 text-center border border-green-200';
            
            // NEWS
            document.getElementById('news-score').textContent = scores.news.total_score;
            document.getElementById('news-status').textContent = scores.news.risk_level;
            const newsColor = scores.news.total_score >= 7 ? 'red' : scores.news.total_score >= 5 ? 'yellow' : 'green';
            document.getElementById('news-card').className = `bg-${newsColor}-50 rounded p-2 text-center border border-${newsColor}-200`;
            
            // 休克评估
            const shock = stage1.shock_assessment;
            document.getElementById('shock-banner').className = shock.is_septic_shock 
                ? 'flex items-center justify-between p-2 bg-red-100 rounded border border-red-300'
                : 'flex items-center justify-between p-2 bg-green-50 rounded';
            document.getElementById('shock-banner').innerHTML = shock.is_septic_shock
                ? `<div class="flex items-center"><span class="text-lg mr-2">🚨</span><span class="text-sm font-bold text-red-700">脓毒性休克确诊</span></div><span class="text-xs px-2 py-1 bg-red-200 text-red-800 rounded font-bold">立即抢救</span>`
                : `<div class="flex items-center"><span class="text-lg mr-2">✅</span><span class="text-sm">无休克征象</span></div><span class="text-xs px-2 py-1 bg-green-200 text-green-800 rounded">MAP ${shock.map.toFixed(0)} Lac ${shock.lactate.toFixed(1)}</span>`;
            
            // 风险徽章
            const risk = stage1.risk_stratification;
            document.getElementById('risk-badge').textContent = risk.level;
            document.getElementById('risk-badge').className = risk.level === '极高危' ? 'text-xs bg-red-100 text-red-700 px-2 py-0.5 rounded font-bold'
                : risk.level === '高危' ? 'text-xs bg-orange-100 text-orange-700 px-2 py-0.5 rounded font-bold'
                : risk.level === '中危' ? 'text-xs bg-yellow-100 text-yellow-700 px-2 py-0.5 rounded'
                : 'text-xs bg-green-100 text-green-700 px-2 py-0.5 rounded';
            
            // Stage 2: 原有Phenotype逻辑已迁移到S6 API
            // S6结果在updateS6Dashboard中单独更新
            // 保留旧版图表但不显示数据
            if (phenotypeChart) {
                phenotypeChart.data.datasets[0].data = [25, 25, 25, 25];
                phenotypeChart.update();
            }
            
            // Stage 3: 治疗决策
            const bundles = stage3.sepsis_bundles;
            document.getElementById('sepsis-bundles').innerHTML = `
                <div class="p-2 bg-red-50 rounded border-l-4 border-red-500">
                    <div class="font-medium text-sm mb-1">1小时Bundle (必须)</div>
                    <div class="space-y-1">
                        ${bundles['1_hour'].map(b => `<div class="flex items-center text-xs"><span class="w-2 h-2 bg-red-500 rounded-full mr-2"></span>${b.action} <span class="ml-auto text-gray-400">${b.evidence}</span></div>`).join('')}
                    </div>
                </div>
                ${bundles['3_hour'].length > 0 ? `
                <div class="p-2 bg-yellow-50 rounded border-l-4 border-yellow-500">
                    <div class="font-medium text-sm mb-1">3小时Bundle (推荐)</div>
                    <div class="space-y-1">
                        ${bundles['3_hour'].map(b => `<div class="flex items-center text-xs"><span class="w-2 h-2 bg-yellow-500 rounded-full mr-2"></span>${b.action}</div>`).join('')}
                    </div>
                </div>` : ''}
            `;
            
            // 液体策略
            const fluid = stage3.fluid_therapy;
            document.getElementById('fluid-content').innerHTML = `
                <div class="font-medium">${fluid.strategy}</div>
                <div>${fluid.amount} ${fluid.type}</div>
                <div class="mt-1 text-green-700">目标: ${fluid.targets.join(', ')}</div>
            `;
            
            // 血管活性药物
            const vaso = stage3.vasopressor_guidance;
            document.getElementById('vaso-content').innerHTML = vaso.indicated
                ? `<div class="font-bold text-red-700">需要血管活性药物</div><div>首选: ${vaso.first_line}</div><div>目标: ${vaso.target}</div>`
                : vaso.standby ? `<div>备用方案: ${vaso.first_line}</div><div>触发: ${vaso.trigger}</div>`
                : '<div>暂不需要</div>';
            
            // 表型特异性治疗
            const phenoTreat = stage3.phenotype_specific;
            document.getElementById('phenotype-treatment').innerHTML = `
                <div class="font-medium">${phenoTreat.primary_strategy}</div>
                <div class="mt-1">抗生素: ${phenoTreat.antibiotics}</div>
                <div>监测: ${phenoTreat.monitoring}</div>
            `;
            
            // 监测计划
            const monitor = stage3.monitoring_plan;
            document.getElementById('monitoring-plan').innerHTML = `
                <div class="p-2 bg-blue-50 rounded">
                    <div class="text-gray-500">监测频率</div>
                    <div class="font-medium text-blue-700">${monitor.frequency}</div>
                </div>
                <div class="p-2 bg-green-50 rounded">
                    <div class="text-gray-500">复评计划</div>
                    <div class="font-medium text-green-700">${stage3.reassessment.lactate_recheck || '常规'}</div>
                </div>
            `;
            
            // 更新Pipeline进度指示器
            document.getElementById('pipeline-stage-1').querySelector('.w-8').className = 'w-8 h-8 rounded-full bg-red-500 text-white flex items-center justify-center text-sm font-bold';
            document.getElementById('pipeline-stage-2').querySelector('.w-8').className = 'w-8 h-8 rounded-full bg-yellow-500 text-white flex items-center justify-center text-sm font-bold';
            document.getElementById('pipeline-stage-3').querySelector('.w-8').className = 'w-8 h-8 rounded-full bg-green-500 text-white flex items-center justify-center text-sm font-bold';
        }
