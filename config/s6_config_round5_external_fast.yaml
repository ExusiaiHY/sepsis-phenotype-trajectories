# S6 external validation fast profile:
# keep the round-5 logic (stability gate + live TimesFM), but trim the external
# runtime so we can get a real cloud result without waiting for a very long CPU job.

missingness:
  gap_window: 6
  features: ["mask", "gap_length", "density_change"]

causal:
  method: t_learner
  treatment_proxy: vasopressor_proxy
  treatment_horizon: 24
  outcome_col: mortality_inhospital
  stability_gate:
    enabled: true
    max_std: 0.12
    max_abs_q90: 0.15

imputation:
  enabled: true
  fit_patients: 512
  epochs: 1
  batch_size: 64
  n_layers: 2
  d_model: 64
  n_heads: 4
  d_ffn: 128
  patience: 1
  device: cpu

timesfm:
  enabled: true
  context_len: 32
  horizon_len: 6
  batch_size: 512
  backend: cpu
  freq: 0
  input_source: imputed
  selected_features: ["map"]
  repo_id: google/timesfm-1.0-200m-pytorch

dowhy:
  enabled: true
  max_samples: 1500
  random_common_cause_simulations: 20
  placebo_treatment_simulations: 20

domain_adaptation:
  enabled: false
  method: coral
  min_group_size: 200
  reg: 0.001

organ_scoring:
  horizon: 24
  sofa_version: sepsis3

phenotype_naming:
  deterioration_slope_threshold: 0.01
  cate_responsiveness_threshold: 0.02
  low_severity_sofa_max: 2
  low_severity_mortality_max: 0.10
  severity_split_targets:
    - hemodynamic_unstable_proxy_refractory
    - hemodynamic_unstable_proxy_responsive
    - neurological_decline
    - respiratory_failure

paths:
  s0_dir: data/s0
  s2_dir: data/s2
  s15_encoder: data/s15/checkpoints/pretrain_best.pt
  output_dir: data/s6_external_generalization_20260401_round5_fast

runtime:
  device: auto
  log_level: INFO
  seed: 42
