# S6 Round 10: T-Learner + split hemodynamic_refractory + gentler CORAL
# Analysis from R9:
#   - X-Learner was worse than T-Learner (mort_range 0.479 vs 0.536 in R7)
#   - hemodynamic_unstable_proxy_refractory is too large (n=2617), needs splitting
#   - CORAL worked (improved_mean_gap=True) but alpha=0.5 may be too strong
# Changes:
#   - Revert to t_learner
#   - Add hemodynamic_unstable_proxy_refractory to severity_split_targets
#   - Lower CORAL alpha to 0.3
#   - Keep expanded 5-feature missingness (creatinine, bilirubin, gcs added)

missingness:
  gap_window: 6
  features: ["mask", "gap_length", "density_change"]
  append_patient_features: true
  selected_features: ["map", "lactate", "creatinine", "bilirubin", "gcs"]

causal:
  method: t_learner
  treatment_proxy: vasopressor_proxy
  treatment_horizon: 24
  outcome_col: mortality_inhospital
  stability_gate:
    enabled: true
    max_std: 0.12
    max_abs_q90: 0.15

imputation:
  enabled: true
  fit_patients: 1024
  epochs: 1
  batch_size: 64
  n_layers: 2
  d_model: 64
  n_heads: 4
  d_ffn: 128
  patience: 1
  device: cpu

timesfm:
  enabled: true
  context_len: 32
  horizon_len: 6
  batch_size: 128
  backend: cpu
  freq: 0
  input_source: imputed
  selected_features: ["map", "heart_rate", "lactate", "creatinine"]
  repo_id: google/timesfm-1.0-200m-pytorch

dowhy:
  enabled: true
  max_samples: 3000
  random_common_cause_simulations: 20
  placebo_treatment_simulations: 20

domain_adaptation:
  enabled: true
  method: coral
  min_group_size: 200
  reg: 0.001
  alpha: 0.3

organ_scoring:
  horizon: 24
  sofa_version: sepsis3

phenotype_naming:
  deterioration_slope_threshold: 0.01
  cate_responsiveness_threshold: 0.02
  low_severity_sofa_max: 2
  low_severity_mortality_max: 0.10
  severity_split_targets:
    - respiratory_failure
    - hemodynamic_unstable_proxy_responsive
    - neurological_decline
    - hemodynamic_unstable_proxy_refractory

paths:
  s0_dir: data/s0
  s2_dir: data/s2
  s15_encoder: data/s15/checkpoints/pretrain_best.pt
  output_dir: data/s6_round10_local_smoke

runtime:
  device: auto
  log_level: INFO
  seed: 42
