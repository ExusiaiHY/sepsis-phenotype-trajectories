# S6 Optimization: Model enhancement addressing 8 limitations

# --- Missingness Enhancement ---
missingness:
  gap_window: 6          # hours for density change window
  features: ["mask", "gap_length", "density_change"]

# --- Causal Phenotyping ---
causal:
  method: t_learner      # t_learner or x_learner
  treatment_proxy: vasopressor_proxy  # proxy indicator channel 0
  treatment_horizon: 24  # hours to look for treatment exposure
  outcome_col: mortality_inhospital

# --- Organ Scoring ---
organ_scoring:
  horizon: 24            # hours for SOFA sub-score computation
  sofa_version: sepsis3  # Singer et al., JAMA 2016

# --- Phenotype Naming ---
phenotype_naming:
  deterioration_slope_threshold: 0.01
  cate_responsiveness_threshold: 0.02
  low_severity_sofa_max: 2
  low_severity_mortality_max: 0.10

# --- Paths ---
paths:
  s0_dir: data/s0
  s2_dir: data/s2
  s15_encoder: data/s15/checkpoints/pretrain_best.pt
  output_dir: data/s6_rerun_20260401

runtime:
  device: auto
  log_level: INFO
  seed: 42
